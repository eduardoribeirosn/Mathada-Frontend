<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Admin Mercado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

    <header class="navbar">
        <div class="navbar-content">
            <h2><a href="dashboard-admin.html" style="text-decoration: none; color: inherit;">📦 Marthada Admin</a></h2>
            
            <nav class="navbar-links">
                <a href="dashboard-admin.html" class="nav-link">Dashboard</a>
                <a href="lista-produtos.html" class="nav-link active">Produtos</a>
                <a href="categorias.html" class="nav-link">Categorias</a>
            </nav>

            <button id="logoutBtn" class="btn-text-menu">Menu</button>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="admin-card">
            <div class="card-header-flex">
                <h2>Produtos</h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="abrirModalCategoria()" class="btn btn-outline">Nova Categoria</button>
                    <a href="novo-produto.html" class="btn btn-primary">Novo Produto</a>
                </div>
            </div>

            <div class="product-grid" id="productGrid">
                <div class="loading-text text-center" style="grid-column: 1 / -1; padding: 40px;">
                    Carregando produtos...
                </div>
            </div>
            <div id="modalCategoria" class="modal-overlay">
                <div class="modal-content">
                    <h3 style="margin-bottom: 15px;">Cadastrar Nova Categoria</h3>
                    
                    <div class="input-group">
                        <label for="nomeCategoria">Nome da Categoria</label>
                        <input type="text" id="nomeCategoria" placeholder="Ex: Bebidas, Frios, Padaria...">
                    </div>
                    
                    <p id="erroCategoria" class="error-text" style="display: none;"></p>

                    <div class="modal-actions">
                        <button onclick="fecharModalCategoria()" class="btn btn-outline">Cancelar</button>
                        <button onclick="salvarCategoria()" id="btnSalvarCategoria" class="btn btn-primary">Salvar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/lista-produtos.js"></script>
</body>
</html>
