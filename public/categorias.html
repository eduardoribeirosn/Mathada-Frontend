<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Admin Mercado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

    <header class="navbar">
        <div class="navbar-content">
            <h2><a href="dashboard-admin.html" style="text-decoration: none; color: inherit;">📦 Marthada Admin</a></h2>
            
            <nav class="navbar-links">
                <a href="dashboard-admin.html" class="nav-link">Dashboard</a>
                <a href="lista-produtos.html" class="nav-link">Produtos</a>
                <a href="categorias.html" class="nav-link active">Categorias</a>
            </nav>

            <button id="logoutBtn" class="btn-text-menu">Menu</button>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="admin-card">
            <div class="card-header-flex">
                <h2>Categorias</h2>
                <button onclick="abrirModalCategoria()" class="btn btn-primary">Nova Categoria</button>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th style="width: 60%;">Nome da Categoria</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="categoriasTableBody">
                        <tr>
                            <td colspan="3" class="loading-text text-center" style="padding: 20px;">Carregando categorias...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalCategoria" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitulo" style="margin-bottom: 15px;">Nova Categoria</h3>
            
            <input type="hidden" id="categoriaId">
            
            <div class="input-group">
                <label for="nomeCategoria">Nome da Categoria</label>
                <input type="text" id="nomeCategoria" placeholder="Ex: Bebidas, Frios...">
            </div>
            
            <p id="erroCategoria" class="error-text" style="display: none;"></p>

            <div class="modal-actions">
                <button onclick="fecharModalCategoria()" class="btn btn-outline">Cancelar</button>
                <button onclick="salvarCategoria()" id="btnSalvarCategoria" class="btn btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <script src="js/categorias.js"></script>
</body>
</html>
